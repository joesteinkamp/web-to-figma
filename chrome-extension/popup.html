<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>Web to Figma</h1>

  <div id="connection" class="connection disconnected">
    <span class="dot"></span>
    <span id="connectionText">Checking server...</span>
  </div>

  <button id="captureBtn" disabled>Capture to Figma</button>

  <div id="status"></div>

  <details class="settings">
    <summary>Settings</summary>
    <label for="serverUrl">Server URL</label>
    <input type="text" id="serverUrl" placeholder="http://localhost:3131">
  </details>

  <p class="hint">
    Run <code>npm start</code> to start the server, then ask Claude Code
    to prepare a Figma capture using <code>generate_figma_design</code>.
  </p>

  <script src="popup.js"></script>
</body>
</html>
