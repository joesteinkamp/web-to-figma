<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Shown when server not running -->
  <div id="setupView" style="display:none">
    <h1>Web to Figma</h1>
    <p class="setup-text">Start the capture server:</p>
    <code class="command">npm run capture</code>
    <button id="retryBtn">Check Again</button>
  </div>

  <!-- Shown when server is running -->
  <div id="captureView" style="display:none">
    <h1>Web to Figma</h1>
    <button id="captureBtn">Capture to Figma</button>
    <div id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
